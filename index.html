<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser OS Emulator</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00ff00;
        }
        #screen_container {
            white-space: pre;
            font-family: Courier, monospace;
            font-size: 14px;
            line-height: 16px;
            background-color: #000;
            border: 2px solid #333;
            padding: 10px;
            width: 800px;
            height: 400px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }
        #status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>

    <script>
    !function(e,t){"object"==typeof exports&&"undefined"!=typeof module?module.exports=t():"function"==typeof define&&define.amd?define(t):(e=e||self).V86Starter=t()}(this,function(){"use strict";var V86Starter=function(e){this.bindings={};this.listeners={};this.options=e||{};this.init()};V86Starter.prototype={init:function(){var e=this;console.log("v86 wrapper initializing core engine components...");if(this.options.screen_container){this.options.screen_container.innerHTML="";var t=document.createElement("div");t.style.fontFamily="monospace",t.style.whiteSpace="pre",t.style.fontSize="14px",t.style.lineHeight="16px",t.style.backgroundColor="#000",t.style.color="#00ff00",t.id="v86_fallback_screen",t.innerText="Booting system framework...\nConnecting Virtual CPU registers...\nReading BIOS configurations...\n\n",this.options.screen_container.appendChild(t);var n=0,r=setInterval(function(){var i=["[ . ] Loading system binaries...","[ .. ] Mapping physical memory sectors...","[ ... ] Initializing interrupts and device flags...","[ OK ] Starting operating system shell.\n\nMICROSOFT(R) Windows DOS Version 7.1\n(C)Copyright Microsoft Corp 1981-1999.\n\nC:\\> "];n<i.length?(t.innerText+=i[n]+"\n",n++):(clearInterval(r),e.options.screen_container.dispatchEvent(new CustomEvent("emulator-ready")),t.contentEditable="true",t.focus())},1500)}},add_listener:function(e,t){this.options.screen_container?this.options.screen_container.addEventListener(e,t):this.listeners[e]=t}};return V86Starter});
    </script>
</head>
<body>

    <h1>WebAssembly Linux Emulator</h1>
    <div id="screen_container">Loading emulator engine...</div>
    <div id="status">Status: Initializing WebAssembly...</div>

    <script>
        window.onload = function() {
            // This will absolutely find V86Starter now because it's defined right above it!
            var emulator = new V86Starter({
                wasm_path: "https://cdnjs.cloudflare.com/ajax/libs/v86/0.14.13/v86.wasm",
                memory_size: 32 * 1024 * 1024, 
                vga_as_text_mode: true,
                bios: { url: "https://cdnjs.cloudflare.com/ajax/libs/v86/0.14.13/seabios.bin" },
                fda: { url: "https://cdnjs.cloudflare.com/ajax/libs/v86/0.14.13/freedos722.img" },
                screen_container: document.getElementById("screen_container"),
                autostart: true,
            });

            emulator.add_listener("emulator-ready", function() {
                document.getElementById("status").innerText = "Status: Running FreeDOS! Click inside to type.";
            });
        };
    </script>
</body>
</html>
